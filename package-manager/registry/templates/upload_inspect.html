<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Inspect {{FILE_NAME}} · Void Registry</title>
  <style>
    :root {
      --bg: #f2f8f5;
      --ink: #0e1d21;
      --ink-soft: #4a5f66;
      --line: #d2e5de;
      --card: #ffffff;
      --brand: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", "IBM Plex Sans", "Avenir Next", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #d0efe9 0, #f2f8f5 38%),
        linear-gradient(180deg, #f2f8f5, #ecf6f2);
    }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 26px rgba(15, 118, 110, 0.08);
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    code {
      background: #eaf2ef;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #f7fbf9;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      max-height: 65vh;
      overflow: auto;
    }
    a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 700;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="/">← Back to registry</a></p>
    <article class="card">
      <h1>Inspect Server File</h1>
      <div class="meta">
        <div><strong>File:</strong> <code>{{FILE_NAME}}</code></div>
        <div><strong>Size:</strong> <code>{{FILE_SIZE}}</code> bytes</div>
        <div><strong>Content-Type:</strong> <code>{{CONTENT_TYPE}}</code></div>
        <div><strong>SHA-256:</strong> <code>{{SHA256}}</code></div>
        <div><strong>Preview mode:</strong> <code>{{PREVIEW_KIND}}</code></div>
      </div>
      <p><a href="{{RAW_URL}}" target="_blank" rel="noopener">Open Raw File Response</a></p>
      <pre>{{PREVIEW}}</pre>
    </article>
  </div>
</body>
</html>
